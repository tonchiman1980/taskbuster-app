<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>タスクバスター</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0a0a1a; --panel: #12122a; --border: #3a3a6a;
      --accent: #ffdd00; --accent-dim: #a08800;
      --red: #ff4444; --green: #44ff88; --text: #e0e0ff; --text-dim: #6060a0;
      --high: #ff4444; --mid: #ffaa00; --low: #44aaff;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; overflow: hidden; }
    #app { height: 100%; display: flex; flex-direction: column; }
    .header { background: var(--panel); border-bottom: 3px solid var(--accent); padding: 50px 16px 12px; flex-shrink: 0; }
    .header-title { color: var(--accent); font-size: 20px; font-weight: bold; letter-spacing: 2px; }
    .header-sub { color: var(--text-dim); font-size: 11px; margin-top: 2px; }
    .back-btn { color: var(--accent); font-size: 14px; margin-bottom: 6px; cursor: pointer; display: inline-block; }
    .filter-row { display: flex; gap: 8px; padding: 10px 12px; flex-shrink: 0; overflow-x: auto; }
    .filter-btn { padding: 6px 12px; border: 2px solid var(--border); border-radius: 4px; background: transparent; color: var(--text-dim); font-size: 12px; font-family: 'Courier New', monospace; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .filter-btn.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .task-list { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 100px; }
    .task-card { background: var(--panel); border: 2px solid var(--border); border-radius: 4px; padding: 12px; margin-bottom: 10px; }
    .priority-badge { display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: 11px; font-weight: bold; color: #000; margin-bottom: 6px; }
    .task-text { color: var(--text); font-size: 15px; line-height: 1.5; margin-bottom: 10px; }
    .task-btns { display: flex; gap: 8px; }
    .clear-btn { flex: 1; background: var(--green); padding: 10px; border-radius: 3px; text-align: center; font-weight: bold; font-size: 14px; color: #000; font-family: 'Courier New', monospace; cursor: pointer; border: none; }
    .delete-btn { background: var(--panel); border: 2px solid var(--red); padding: 10px 14px; border-radius: 3px; color: var(--red); font-weight: bold; font-size: 14px; cursor: pointer; font-family: 'Courier New', monospace; }
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); text-align: center; font-size: 14px; line-height: 2; }
    .fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; font-weight: bold; font-size: 16px; padding: 16px 30px; border-radius: 4px; border: none; cursor: pointer; font-family: 'Courier New', monospace; letter-spacing: 1px; box-shadow: 0 0 20px rgba(255,221,0,0.5); }
    #record-screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
    .mascot-area { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 20px 16px; }
    .mascot-speech { background: var(--panel); border: 2px solid var(--border); border-radius: 4px; padding: 10px; font-size: 14px; line-height: 1.6; max-width: 140px; }
    .mic-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 120px; height: 120px; border-radius: 60px; border: 4px solid var(--accent); background: var(--panel); margin: 0 auto 16px; cursor: pointer; font-family: 'Courier New', monospace; }
    .mic-btn.listening { border-color: var(--red); background: #2a0a0a; }
    .mic-icon { font-size: 36px; }
    .mic-label { color: var(--text); font-size: 11px; margin-top: 4px; }
    .section-label { color: var(--accent-dim); font-size: 12px; margin-bottom: 6px; letter-spacing: 1px; padding: 0 16px; }
    textarea { display: block; width: calc(100% - 32px); margin: 0 16px 20px; background: var(--panel); border: 2px solid var(--border); border-radius: 4px; color: var(--text); padding: 12px; font-size: 15px; min-height: 100px; font-family: 'Courier New', monospace; resize: none; }
    textarea::placeholder { color: var(--text-dim); }
    .priority-row { display: flex; gap: 10px; padding: 0 16px; margin-bottom: 24px; }
    .priority-opt { flex: 1; padding: 12px; border-radius: 4px; border: 2px solid var(--border); background: transparent; color: var(--text); font-size: 13px; font-weight: bold; font-family: 'Courier New', monospace; cursor: pointer; text-align: center; }
    .priority-opt.selected-high { background: var(--high); border-color: var(--high); color: #000; }
    .priority-opt.selected-mid { background: var(--mid); border-color: var(--mid); color: #000; }
    .priority-opt.selected-low { background: var(--low); border-color: var(--low); color: #000; }
    .add-btn { display: block; width: calc(100% - 32px); margin: 0 16px; background: var(--accent); color: #000; font-weight: bold; font-size: 16px; padding: 18px; border-radius: 4px; border: none; cursor: pointer; font-family: 'Courier New', monospace; letter-spacing: 1px; }
    .add-btn:disabled { background: var(--accent-dim); opacity: 0.5; }
    #clear-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 100; }
    #clear-modal.show { display: flex; }
    .clear-box { background: var(--panel); border: 4px solid var(--accent); border-radius: 6px; padding: 28px; text-align: center; width: 85%; max-width: 360px; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    .clear-stars { color: var(--accent); font-size: 26px; margin-bottom: 6px; letter-spacing: 8px; }
    .clear-title { color: var(--accent); font-size: 24px; font-weight: bold; letter-spacing: 2px; line-height: 1.4; }
    .clear-task { color: var(--text); font-size: 14px; margin-top: 10px; line-height: 1.6; }
    .clear-sub { color: var(--green); font-size: 18px; font-weight: bold; margin-top: 4px; }
    .clear-next-btn { margin-top: 20px; background: var(--accent); color: #000; font-weight: bold; font-size: 15px; padding: 14px 32px; border-radius: 4px; border: none; cursor: pointer; font-family: 'Courier New', monospace; letter-spacing: 1px; }
  </style>
</head>
<body>
<div id="app">
  <div id="list-screen">
    <div class="header">
      <div class="header-title">⚔ タスクバスター</div>
      <div class="header-sub" id="task-count">残りミッション: 0</div>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
      <button class="filter-btn" data-filter="high" onclick="setFilter('high')">★ 高</button>
      <button class="filter-btn" data-filter="mid" onclick="setFilter('mid')">◆ 中</button>
      <button class="filter-btn" data-filter="low" onclick="setFilter('low')">▲ 低</button>
    </div>
    <div class="task-list" id="task-list"></div>
    <button class="fab" onclick="showRecord()">🎙 録音する</button>
  </div>

  <div id="record-screen">
    <div class="header">
      <span class="back-btn" onclick="hideRecord()">◀ もどる</span>
      <div class="header-title">🎙 アイデア録音</div>
    </div>
    <div class="mascot-area">
      <canvas id="mascot-canvas" width="80" height="96"></canvas>
      <div class="mascot-speech" id="mascot-speech">マイクを押して<br>アイデアを話してね</div>
    </div>
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
      <span class="mic-icon" id="mic-icon">🎙</span>
      <span class="mic-label" id="mic-label">録音スタート</span>
    </button>
    <div class="section-label">▶ 内容（修正できます）</div>
    <textarea id="transcript" placeholder="ここにアイデアが入ります..."></textarea>
    <div class="section-label">▶ 優先度</div>
    <div class="priority-row">
      <button class="priority-opt" data-p="high" onclick="setPriority('high')">★ 高</button>
      <button class="priority-opt selected-mid" data-p="mid" onclick="setPriority('mid')">◆ 中</button>
      <button class="priority-opt" data-p="low" onclick="setPriority('low')">▲ 低</button>
    </div>
    <button class="add-btn" id="add-btn" onclick="addTask()" disabled>⚔ ミッション追加！</button>
    <div style="height:40px"></div>
  </div>
</div>

<div id="clear-modal">
  <div class="clear-box">
    <div class="clear-stars">★ ★ ★</div>
    <div class="clear-title">MISSION CLEAR!<br>ミッションクリア！</div>
    <canvas id="clear-mascot" width="120" height="144" style="margin:16px auto;display:block;"></canvas>
    <div class="clear-task" id="clear-task-name"></div>
    <div class="clear-sub">をぶっ倒した！</div>
    <button class="clear-next-btn" onclick="closeClear()">▶ つぎへ</button>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('taskbuster_tasks') || '[]');
let currentFilter = 'all';
let currentPriority = 'mid';
let recognition = null;
let isListening = false;
let animFrame = null;
let bounceY = 0, bounceDir = 1, blinkCount = 0, blinkOpen = true;
let isTalking = false;

const PRIORITY_ORDER = { high: 0, mid: 1, low: 2 };
const PRIORITY_COLORS = { high: '#ff4444', mid: '#ffaa00', low: '#44aaff' };
const PRIORITY_LABELS = { high: '★ 高', mid: '◆ 中', low: '▲ 低' };

function saveTasks() { localStorage.setItem('taskbuster_tasks', JSON.stringify(tasks)); }

function drawMascot(canvas, scale, talking, cleared) {
  const ctx = canvas.getContext('2d');
  const sz = 8 * scale;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const body = cleared ? '#44ff88' : '#ff9944';
  const bg = '#0a0a1a';
  function b(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x*sz,y*sz,w*sz,h*sz); }
  b(1,0,8,1,body); b(0,1,10,6,body); b(1,7,8,1,body);
  if(blinkOpen){ b(2,2,2,2,bg); b(6,2,2,2,bg); }
  if(talking){ b(3,5,4,1,bg); b(2,5,1,2,bg); b(7,5,1,2,bg); b(3,6,4,1,bg); }
  else if(cleared){ b(2,5,1,1,bg); b(3,6,4,1,bg); b(7,5,1,1,bg); }
  else { b(3,5,4,1,bg); }
  b(2,8,6,3,body); b(0,8,2,2,body); b(8,8,2,2,body);
  b(2,11,2,1,body); b(6,11,2,1,body);
}

function animateMascot() {
  const canvas = document.getElementById('mascot-canvas');
  if (!canvas) return;
  bounceY += bounceDir * 0.3;
  if (bounceY > 6 || bounceY < 0) bounceDir *= -1;
  canvas.style.transform = `translateY(${bounceY.toFixed(1)}px)`;
  blinkCount++;
  if (blinkCount === 150) blinkOpen = false;
  if (blinkCount > 160) { blinkOpen = true; blinkCount = 0; }
  drawMascot(canvas, 1, isTalking, false);
  animFrame = requestAnimationFrame(animateMascot);
}

function showRecord() {
  document.getElementById('list-screen').style.display = 'none';
  const rs = document.getElementById('record-screen');
  rs.style.display = 'flex';
  rs.style.flexDirection = 'column';
  if (animFrame) cancelAnimationFrame(animFrame);
  animateMascot();
}

function hideRecord() {
  stopListening();
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  document.getElementById('record-screen').style.display = 'none';
  document.getElementById('list-screen').style.display = 'block';
  document.getElementById('transcript').value = '';
  setPriority('mid');
  document.getElementById('add-btn').disabled = true;
}

function toggleMic() { isListening ? stopListening() : startListening(); }

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('音声認識に対応していません。\nSafariで開いてください。'); return; }
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;
  recognition.continuous = true;
  recognition.onresult = (e) => {
    let text = '';
    for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
    document.getElementById('transcript').value = text;
    document.getElementById('add-btn').disabled = !text.trim();
  };
  recognition.onend = () => setMicState(false);
  recognition.start();
  setMicState(true);
}

function stopListening() {
  if (recognition) { recognition.stop(); recognition = null; }
  setMicState(false);
}

function setMicState(on) {
  isListening = on; isTalking = on;
  document.getElementById('mic-btn').classList.toggle('listening', on);
  document.getElementById('mic-icon').textContent = on ? '⏹' : '🎙';
  document.getElementById('mic-label').textContent = on ? '録音停止' : '録音スタート';
  document.getElementById('mascot-speech').innerHTML = on ? 'きいてるよ！<br>しゃべって！' : 'マイクを押して<br>アイデアを話してね';
}

function setPriority(p) {
  currentPriority = p;
  document.querySelectorAll('.priority-opt').forEach(btn => {
    btn.className = 'priority-opt' + (btn.dataset.p === p ? ` selected-${p}` : '');
  });
}

function addTask() {
  const text = document.getElementById('transcript').value.trim();
  if (!text) return;
  tasks.push({ id: Date.now().toString(), text, priority: currentPriority });
  saveTasks(); hideRecord(); renderTasks();
}

function completeTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  tasks = tasks.filter(t => t.id !== id);
  saveTasks(); renderTasks(); showClear(task.text);
}

function deleteTask(id) {
  if (!confirm('このミッションを削除しますか？')) return;
  tasks = tasks.filter(t => t.id !== id);
  saveTasks(); renderTasks();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.filter === f));
  renderTasks();
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderTasks() {
  const list = document.getElementById('task-list');
  document.getElementById('task-count').textContent = `残りミッション: ${tasks.length}`;
  const filtered = tasks
    .filter(t => currentFilter === 'all' || t.priority === currentFilter)
    .sort((a,b) => PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority]);
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div style="font-size:40px;margin-bottom:12px">⚔</div><div>${tasks.length === 0 ? 'ミッションがないぞ！<br>録音ボタンで追加しよう' : 'このカテゴリは空だ！'}</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(t => `
    <div class="task-card">
      <div class="priority-badge" style="background:${PRIORITY_COLORS[t.priority]}">${PRIORITY_LABELS[t.priority]}</div>
      <div class="task-text">${escapeHtml(t.text)}</div>
      <div class="task-btns">
        <button class="clear-btn" onclick="completeTask('${t.id}')">✓ クリア</button>
        <button class="delete-btn" onclick="deleteTask('${t.id}')">✕</button>
      </div>
    </div>`).join('');
}

function showClear(name) {
  document.getElementById('clear-task-name').textContent = `「${name}」`;
  document.getElementById('clear-modal').classList.add('show');
  setTimeout(() => {
    const c = document.getElementById('clear-mascot');
    blinkOpen = true;
    if(c) drawMascot(c, 1.5, false, true);
  }, 50);
}

function closeClear() { document.getElementById('clear-modal').classList.remove('show'); }

renderTasks();
</script>
</body>
</html>
